<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Data Lens</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    background: #FFFFFF;
    font-family:"Gill Sans",sans-serif;
    height:100vh;
}

/* MAIN LAYOUT */

.landing-page{
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-left:7%;
    padding-right:4%;
}

/* LEFT SIDE */

.content{
    width:45%;
    max-width:650px;
    z-index:10;
    animation:slideInLeft 1.2s ease forwards;
}

.intro{
    color:#2563EB;
    text-transform:uppercase;
    font-size:2rem;
    letter-spacing:2px;
    margin-bottom:2rem;
}

.content h1{
    color:#174A7E;
    text-transform:uppercase;
    font-size:3rem;
    font-weight:800;
    line-height:0.95;
    margin-bottom:1.5rem;
}

.content h2{
    color:#526174;
    font-size:1.25rem;
    font-weight:400;
    line-height:1.4;
}

/* RIGHT SIDE */

.hero-image-wrapper{
    width:52%;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:all 2s cubic-bezier(.22,1,.36,1);
}

.hero-image{
    width:115%;
    max-width:850px;
    animation:float 4s ease-in-out infinite;
}

/* ENTRANCE */

@keyframes slideInLeft{

    from{
        opacity:0;
        transform:translateX(-80px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

/* FLOATING */

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0);
    }
}

/* EXIT TEXT */

.content.exit{
    opacity:0;
    transform:
        translateX(-500px)
        scale(.7);
}

/* IMAGE FLIES TO TOP LEFT */

.hero-image-wrapper.exit{

    transform:
        translate(-68vw,-40vh)
        scale(.12);

    opacity:0.9;
}

/* SMOOTH TRANSITIONS */

.content{
    transition:
        transform 1.5s ease,
        opacity 1.5s ease;
}

body.fade-out{
    transition:opacity .8s ease;
    opacity:0;
}

/* RESPONSIVE */

@media(max-width:900px){

    .landing-page{
        flex-direction:column;
        justify-content:center;
        text-align:center;
        padding:2rem 1.25rem;
    }

    .content{
        width:100%;
    }

    .content h1{
        font-size:clamp(2.5rem, 10vw, 4rem);
    }

    .content h2{
        font-size:1.5rem;
    }

    .hero-image-wrapper{
        width:min(80%, 620px);
        margin-top:2rem;
    }

    .hero-image{
        width:100%;
    }
}

@media(max-width:560px){
    body{ overflow-y:auto; }
    .landing-page{
        min-height:100vh;
        height:auto;
        padding:2rem 1rem;
    }
    .intro{
        font-size:1rem;
        margin-bottom:1rem;
    }
    .content h1{
        font-size:clamp(2.1rem, 13vw, 3rem);
        line-height:1;
    }
    .content h2{
        font-size:1rem;
    }
    .hero-image-wrapper{
        width:100%;
        margin-top:1.5rem;
    }
}
</style>
</head>
<body>

<div class="landing-page">

    <div class="content" id="content">

        <p class="intro">
            Introducing:
        </p>

        <h1>
            NYC Data Lens
        </h1>

        <h2>
            Urban Mobility Data Analytics
            <br>
            Dashboard Platform
        </h2>

    </div>

    <div class="hero-image-wrapper" id="heroWrapper">

        <img
            src="./assets/images/logo.png"
            alt="NYC Data Lens Logo"
            class="hero-image"
        >

    </div>

</div>

<script>

/* Start exit animation after 4 seconds */

setTimeout(() => {

    document
        .getElementById('content')
        .classList.add('exit');

    document
        .getElementById('heroWrapper')
        .classList.add('exit');

}, 3000);

/* Redirect after animation completes */

setTimeout(() => {

    window.location.href =
        "./pages/dashboard.html";

}, 5000);

</script>

</body>
</html>
